<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="app-version" content="110.0.0">
  <title>Limpa Nome - Acordos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d12">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- LOCK -->
<div id="lock" class="lock">
  <div class="lock-box">
    <div class="lock-logo">🤝</div>
    <h2>Limpa Nome</h2>
    <p>Gestão de acordos financeiros</p>
    <input class="lock-input" type="email" id="loginEmail" placeholder="E-mail">
    <input class="lock-input" type="password" id="loginSenha" placeholder="Senha">
    <button class="btn-login" onclick="fazerLoginFirebase()">ENTRAR</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="topo">
    <div class="perfil" onclick="abrirPerfil()">
      <img id="fotoPerfil" src="https://via.placeholder.com/50">
      <div class="perfil-info">
        <h2 id="nomePerfil">Usuário</h2>
        <small>Perfil ⚙️</small>
      </div>
    </div>
  </div>

  <div class="filtros">
    <button class="ativo" onclick="setFiltro('todas', this)">Pendentes</button>
    <button onclick="setFiltro('pagas', this)">Quitados</button>
  </div>

  <div id="lista" class="lista"></div>

  <div class="rodape">
    <button onclick="adicionarDivida()">➕ Novo Acordo</button>
    <button class="btn-fluxo" onclick="abrirAnaliseDiaria()">📊 Fluxo</button>
    <button onclick="abrirCalculadora()">🧮 Calc</button>
  </div>
</div>

<!-- MODAL NOVO ACORDO -->
<div id="modalNovaDivida" class="modal" style="display:none;">
  <div class="modal-conteudo">
    <div class="modal-handle"></div>
    <p class="modal-titulo">Registrar Acordo</p>

    <label>Credor (banco / loja)</label>
    <input id="newNome" type="text" placeholder="Ex: Nubank, Itaú">

    <label>Valor original da dívida (opcional)</label>
    <input id="newValorOriginal" type="number" placeholder="Ex: 5000.00">

    <label>Valor do acordo fechado</label>
    <input id="newValor" type="number" placeholder="Ex: 1500.00" oninput="calcularPrevia()">

    <label>Vencimento da 1ª parcela</label>
    <input id="newData" type="date">

    <label class="check-row" style="margin-top:12px;">
      <input id="newParcelado" type="checkbox" onchange="toggleParcelasInput()">
      <span>Acordo parcelado?</span>
    </label>

    <div id="divParcelas" style="display:none; margin-top:10px;">
      <label>Quantas parcelas?</label>
      <input id="newQtd" type="number" placeholder="Ex: 12" oninput="calcularPrevia()">
      <p id="txtPrevia" style="font-size:13px; color:var(--green); text-align:center; font-weight:700; margin:6px 0 0;"></p>
    </div>

    <button class="btn-salvar" onclick="salvarDividaFormulario()">SALVAR</button>
    <button class="btn-cancelar" onclick="fecharModalAdicionar()">Cancelar</button>
  </div>
</div>

<!-- MODAL FLUXO DIÁRIO -->
<div id="modalAnalise" class="modal" style="display:none;">
  <div class="modal-conteudo" style="max-width:440px;">
    <div class="modal-handle"></div>
    <p class="modal-titulo" style="color:var(--purple);">📊 Fluxo Diário</p>

    <div style="display:flex; gap:8px; margin-bottom:14px;">
      <input type="month" id="mesFiltroAnalise" style="flex:1; padding:12px 14px; border-radius:8px; background:var(--surface2); color:var(--text); border:1px solid var(--border2); font-size:14px; outline:none;">
      <button onclick="gerarAnaliseDiaria()" style="background:var(--purple); padding:11px 18px; border-radius:8px; border:none; color:white; font-weight:700; font-size:14px; cursor:pointer;">VER</button>
    </div>

    <div id="corpoAnalise" style="max-height:420px; overflow-y:auto;">
      <p class="vazio">Selecione o mês para visualizar o fluxo.</p>
    </div>

    <button onclick="fecharAnaliseDiaria()" class="btn-cancelar" style="margin-top:14px;">Fechar</button>
  </div>
</div>

<!-- MODAL PERFIL -->
<div id="modalPerfil" class="modal" style="display:none;">
  <div class="modal-conteudo">
    <div class="modal-handle"></div>
    <p class="modal-titulo">Perfil</p>
    <div class="perfil-foto-wrap">
      <img id="previewFotoPerfil" src="https://via.placeholder.com/84">
      <br>
      <button onclick="document.getElementById('uploadFotoNova').click()" style="background:var(--surface3); color:var(--text2); border:1px solid var(--border2); font-size:13px; margin-top:10px; padding:8px 16px; border-radius:8px; cursor:pointer;">📸 Alterar foto</button>
      <input type="file" id="uploadFotoNova" hidden onchange="salvarNovaFoto(event)">
    </div>
    <label>Nome</label>
    <input type="text" id="inputNomePerfil" placeholder="Seu nome">
    <button class="btn-salvar" onclick="salvarNomePerfil()">💾 Salvar</button>
    <button class="btn-sair" onclick="sairDaConta()">🚪 Sair da conta</button>
    <button class="btn-cancelar" onclick="fecharModalPerfil()">Voltar</button>
  </div>
</div>

<!-- MODAL CALCULADORA -->
<div id="modalCalc" class="modal" style="display:none;">
  <div class="modal-conteudo">
    <div class="modal-handle"></div>
    <p class="modal-titulo">Calculadora</p>
    <input type="text" id="calcDisplay" readonly style="text-align:right; font-size:22px; font-weight:700; margin-bottom:10px;">
    <div class="calc-grid">
      <button onclick="calcAdd('7')">7</button><button onclick="calcAdd('8')">8</button><button onclick="calcAdd('9')">9</button><button onclick="calcAdd('/')" style="color:var(--purple); font-weight:800;">÷</button>
      <button onclick="calcAdd('4')">4</button><button onclick="calcAdd('5')">5</button><button onclick="calcAdd('6')">6</button><button onclick="calcAdd('*')" style="color:var(--purple); font-weight:800;">×</button>
      <button onclick="calcAdd('1')">1</button><button onclick="calcAdd('2')">2</button><button onclick="calcAdd('3')">3</button><button onclick="calcAdd('-')" style="color:var(--purple); font-weight:800;">−</button>
      <button onclick="calcAdd('0')">0</button><button onclick="calcAdd('.')">.</button><button onclick="calcCalcular()" style="background:var(--green); color:white; font-size:18px;">=</button><button onclick="calcAdd('+')" style="color:var(--purple); font-weight:800;">+</button>
    </div>
    <button onclick="calcLimpar()" style="background:var(--red-dim); color:var(--red); border:1px solid rgba(239,68,68,0.2); width:100%; margin-top:10px; padding:12px; border-radius:8px; font-weight:700; cursor:pointer;">C — Limpar</button>
    <button class="btn-cancelar" onclick="fecharCalculadora()">Fechar</button>
  </div>
</div>

<script src="app.js"></script>
<script>
  if ("serviceWorker" in navigator) { navigator.serviceWorker.register("service-worker.js"); }
  window.checarVersaoServidor = async function() {
    try {
      const resp = await fetch(window.location.origin + window.location.pathname + "?t=" + Date.now(), {cache:"no-store"});
      const text = await resp.text();
      const sv = new DOMParser().parseFromString(text, "text/html").querySelector('meta[name="app-version"]')?.content;
      const lv = document.querySelector('meta[name="app-version"]')?.content;
      if (sv && lv && sv !== lv) { if(confirm("Nova versão disponível! Atualizar?")) { window.location.reload(true); } }
    } catch(e) {}
  };
  setTimeout(window.checarVersaoServidor, 2000);
</script>
</body>
</html>
