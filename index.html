<script>
// --- FUNÇÕES DE INTERFACE UI ---
function mostrarMensagem(msg, titulo = "Aviso") {
    document.getElementById('modalDialogo').style.display = 'flex';
    document.getElementById('mdTitulo').innerText = titulo;
    document.getElementById('mdMensagem').innerText = msg;
    document.getElementById('mdBtnCancelar').style.display = 'none';
    document.getElementById('mdBtnOk').onclick = () => { document.getElementById('modalDialogo').style.display = 'none'; };
}

function mostrarConfirmacao(msg, onConfirmar, titulo = "Confirmação") {
    document.getElementById('modalDialogo').style.display = 'flex';
    document.getElementById('mdTitulo').innerText = titulo;
    document.getElementById('mdMensagem').innerText = msg;
    document.getElementById('mdBtnCancelar').style.display = 'block';
    document.getElementById('mdBtnCancelar').onclick = () => { document.getElementById('modalDialogo').style.display = 'none'; };
    document.getElementById('mdBtnOk').onclick = () => { document.getElementById('modalDialogo').style.display = 'none'; if(onConfirmar) onConfirmar(); };
}

// --- CONFIGURAÇÃO FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyDDguzJOP5GKqlqf8GW-xdsTCxh1Ha7C7k",
    authDomain: "sutello-financeiro.firebaseapp.com",
    projectId: "sutello-financeiro",
    storageBucket: "sutello-financeiro.firebasestorage.app",
    messagingSenderId: "460447549653",
    appId: "1:460447549653:web:a36b0c7d2c2919ff633a5c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 🔴 ATENÇÃO: COLOQUE A SUA NOVA CHAVE AQUI ABAIXO. ELA DEVE COMEÇAR COM "AIza..."
const apiKey = "AQ.Ab8RN6L0R00-GdFKydBTO7fPeoyGU2ahRHJ2TMNLKMFEDK0R5A"; 

let dividas = []; // App Limpa Nome
let contasFinanceiras = []; // App Financeiro Principal
let filtro = "todas"; 
let usuarioNomeAtual = "Usuário";

// --- LOGIN E SINCRONIZAÇÃO DE DADOS ---
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("lock").style.display = "none";
        document.getElementById("app").style.display = "block";
        
        // Ouve Acordos
        db.collection("dados_limpanome").doc(user.uid).onSnapshot(doc => {
            if (doc.exists) { dividas = doc.data().dividas || []; render(); }
        }, err => console.error("Erro:", err));
        
        // Ouve Contas Financeiras
        db.collection("dados_financeiros").doc(user.uid).onSnapshot(doc => {
            if (doc.exists) { contasFinanceiras = doc.data().contas || []; }
        }, err => console.error("Erro:", err));
        
        // Ouve Perfil
        db.collection("usuarios_limpanome").doc(user.uid).onSnapshot(doc => {
            if (doc.exists) {
                const d = doc.data();
                if(d.foto) { document.getElementById("fotoPerfil").src = d.foto; document.getElementById("previewFotoPerfil").src = d.foto; }
                if(d.nome) { usuarioNomeAtual = d.nome; document.getElementById("nomePerfil").innerText = d.nome; document.getElementById("inputNomePerfil").value = d.nome; }
            }
        });
    } else {
        document.getElementById("lock").style.display = "flex";
        document.getElementById("app").style.display = "none";
    }
});

function fazerLoginFirebase() {
    const e = document.getElementById("loginEmail").value, s = document.getElementById("loginSenha").value;
    if(e && s) auth.signInWithEmailAndPassword(e, s).catch(() => mostrarMensagem("E-mail ou senha incorretos.", "Erro"));
    else mostrarMensagem("Preencha e-mail e senha.");
}
function sairDaConta() { mostrarConfirmacao("Deseja sair?", () => { auth.signOut().then(() => location.reload()); }); }

// --- PERSISTÊNCIA DE DADOS ---
function salvarAcordos() { 
    if(auth.currentUser) db.collection("dados_limpanome").doc(auth.currentUser.uid).set({dividas}, {merge:true}); 
    render(); 
}
function salvarContasAppFinanceiro() { 
    if(auth.currentUser) db.collection("dados_financeiros").doc(auth.currentUser.uid).set({contas: contasFinanceiras}, {merge:true}); 
}

// --- RENDERIZAÇÃO VISUAL (Tela Principal exibe apenas os Acordos) ---
function render() {
    const lista = document.getElementById("lista");
    if(!lista) return;
    lista.innerHTML = "";

    const grupos = {};
    [...dividas].sort((a,b) => new Date(a.vencimento) - new Date(b.vencimento)).forEach(d => {
        const dt = new Date(d.vencimento + "T12:00:00");
        const k = (dt.getMonth() + 1).toString().padStart(2, '0') + "/" + dt.getFullYear();
        if(!grupos[k]) grupos[k] = [];
        grupos[k].push(d);
    });

    Object.keys(grupos).forEach(k => {
        const todasDoMes = grupos[k];
        const visiveis = todasDoMes.filter(d => filtro === "pagas" ? d.paga : !d.paga);

        if (visiveis.length === 0) return;

        let totalMes = 0, pagoMes = 0;
        todasDoMes.forEach(d => { totalMes += d.valor; if(d.paga) pagoMes += d.valor; });
        const falta = totalMes - pagoMes;
        const porcentagem = totalMes > 0 ? ((pagoMes/totalMes)*100).toFixed(0) : 0;

        const bloco = document.createElement("div");
        bloco.className = "mes-container";
        bloco.innerHTML = `
          <div class="cabecalho-mes"><h3>📅 ${k}</h3></div>
          <div class="resumo-mes">
              <div class="resumo-item"><small>Total Acordos</small><strong style="font-size:14px;">R$ ${totalMes.toFixed(2)}</strong></div>
              <div class="resumo-item"><small>Quitado</small><strong style="color:#2ecc71; font-size:14px;">R$ ${pagoMes.toFixed(2)}</strong></div>
              <div class="resumo-item"><small>Falta</small><strong style="color:#ef5350; font-size:14px;">R$ ${falta.toFixed(2)}</strong></div>
              <div class="barra-container"><div class="barra-fundo"><div class="barra-preenchimento" style="width: ${porcentagem}%"></div></div></div>
          </div>
        `;

        visiveis.forEach(d => {
            const div = document.createElement("div");
            div.className = d.paga ? "conta verde" : "conta";
            div.innerHTML = `
                <div style="font-size: 1.1em; margin-bottom: 8px;"><strong>🏦 ${d.nome}</strong></div>
                <div style="font-size: 1.3em; font-weight: bold; margin-bottom: 5px;">💰 R$ ${d.valor.toFixed(2)}</div>
                <div style="color:#aaa; font-size:13px; margin-bottom: 10px;">📅 Vencimento: ${d.vencimento.split("-").reverse().join("/")}</div>
                <div class="info-parcelas" style="background:#111; padding:8px 12px; border-radius:8px; display:inline-block; font-size:12px; border:1px solid #333;">📦 Parcela ${d.parcelaAtual || 1} de ${d.totalParcelas || 1}</div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    ${!d.paga ? `<button onclick="pagarDivida('${d.id}')" style="flex:3; background:#2ecc71; padding:12px; border-radius:8px;">✅ QUITAR</button>` : `<button onclick="desfazerPagamento('${d.id}')" style="flex:3; background:#444; padding:12px; border-radius:8px;">↩️ DESFAZER</button>`}
                </div>
            `;
            bloco.appendChild(div);
        });
        lista.appendChild(bloco);
    });
}

function pagarDivida(id) {
    const d = dividas.find(x => x.id === id);
    if(!d) return;
    d.paga = true;
    if(d.totalParcelas > 0 && d.parcelaAtual < d.totalParcelas) {
        const dt = new Date(d.vencimento + "T12:00:00"); dt.setMonth(dt.getMonth() + 1);
        dividas.push({ ...d, id: Date.now().toString(), paga: false, parcelaAtual: d.parcelaAtual + 1, vencimento: dt.toISOString().split("T")[0] });
    }
    salvarAcordos();
}

function desfazerPagamento(id) { const d = dividas.find(x => x.id === id); if(d) { d.paga = false; salvarAcordos(); } }
function setFiltro(f, b) { filtro = f; document.querySelectorAll('.filtros button').forEach(x => x.classList.remove('ativo')); b.classList.add('ativo'); render(); }

function fecharSutelloChat() { document.getElementById("modalSutelloChat").style.display = "none"; }

function adicionarMensagemUI(remetente, texto) {
    const container = document.getElementById("chatHistoryContainer");
    const wrapper = document.createElement("div");
    wrapper.className = "chat-bubble-wrapper";
    wrapper.innerHTML = `<div class="chat-bubble ${remetente}">${formatarMarkdown(texto)}</div>`;
    container.appendChild(wrapper);
    container.scrollTop = container.scrollHeight;
}

function formatarMarkdown(texto) {
    if (!texto) return "";
    let html = texto.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
    html = html.replace(/^\s*[-*]\s+(.*)$/gm, '<div style="display:flex; align-items:flex-start; gap:6px; margin: 5px 0 5px 12px;"><span style="color:#7b2ff7; font-weight:bold;">•</span><span>$1</span></div>');
    html = html.replace(/\n/g, '<br>');
    return html;
}

function enviarTextoSugerido(t) { document.getElementById("chatInputField").value = t; enviarMensagemSutello(); }

// Motor de Extração e Execução de Ações da IA
function processarAcoesIA(textoIA) {
    const regex = /<sutello_action>([\s\S]*?)<\/sutello_action>/;
    const match = textoIA.match(regex);
    let textoLimpo = textoIA.replace(regex, "").trim();

    if (match) {
        try {
            let jsonStr = match[1].replace(/```json/gi, '').replace(/```/g, '').trim();
            const actions = JSON.parse(jsonStr);
            let updateFinanceiro = false, updateAcordos = false;

            actions.forEach(act => {
                const isFinanceiro = act.action.includes("conta");
                const isAcordo = act.action.includes("acordo");
                const targetArray = isFinanceiro ? contasFinanceiras : dividas;

                if (act.action === "add_conta" || act.action === "add_acordo") {
                    targetArray.push({
                        id: Date.now().toString() + Math.floor(Math.random()*1000),
                        nome: act.nome, valor: parseFloat(act.valor), vencimento: act.vencimento,
                        paga: false, totalParcelas: parseInt(act.qtdParcelas) || 1, parcelaAtual: 1
                    });
                    if(isFinanceiro) updateFinanceiro = true; else updateAcordos = true;
                }
                else if (act.action === "delete_conta" || act.action === "delete_acordo") {
                    const i = targetArray.findIndex(x => x.id === act.id);
                    if(i > -1) { targetArray.splice(i, 1); if(isFinanceiro) updateFinanceiro = true; else updateAcordos = true; }
                }
                else if (act.action === "edit_conta" || act.action === "edit_acordo") {
                    const i = targetArray.findIndex(x => x.id === act.id);
                    if(i > -1) { 
                        if(act.nome) targetArray[i].nome = act.nome;
                        if(act.valor) targetArray[i].valor = parseFloat(act.valor);
                        if(act.vencimento) targetArray[i].vencimento = act.vencimento;
                        if(isFinanceiro) updateFinanceiro = true; else updateAcordos = true;
                    }
                }
            });

            if (updateFinanceiro) salvarContasAppFinanceiro();
            if (updateAcordos) salvarAcordos();

        } catch(e) { console.error("Erro interno ao parsear comando JSON da IA", e); }
    }
    return textoLimpo;
}

function obterPromptAvancado() {
    const hj = new Date();
    const strData = `${hj.getDate().toString().padStart(2,'0')}/${(hj.getMonth()+1).toString().padStart(2,'0')}/${hj.getFullYear()}`;
    
    // Passa os IDs para que a IA consiga excluir ou editar
    const ac = dividas.map(d => `[ID:${d.id}] ${d.nome}: R$ ${d.valor} | Vence: ${d.vencimento} | Status: ${d.paga?'PAGO':'PENDENTE'}`).join('\n');
    const fn = contasFinanceiras.map(c => `[ID:${c.id}] ${c.nome}: R$ ${c.valor} | Vence: ${c.vencimento} | Status: ${c.paga?'PAGO':'PENDENTE'}`).join('\n');

    return `Você é Sutello, um assistente de IA focado em Finanças. 
Hoje é dia ${strData}. Usuário: ${usuarioNomeAtual}.
=== ACORDOS (Limpa Nome) ===\n${ac || "Vazio"}\n=== CONTAS (App Financeiro) ===\n${fn || "Vazio"}\n
Seu dever é responder as perguntas conversando normalmente com o usuário. Caso o usuário mande ADICIONAR, EDITAR ou EXCLUIR, você vai fazer isso enviando um comando secreto no final do texto.
Por padrão, ao falar de contas ou adicionar algo genérico (ex: "pagar carro"), use as CONTAS (App Financeiro). Só use ACORDOS se o usuário mencionar acordo ou limpa nome.

DICA DE MATEMÁTICA: Se o usuário pedir para adicionar "10000 em 5 vezes", você DEVE dividir. O "valor" da parcela será 2000. Calcule a data de vencimento corretamente para o formato AAAA-MM-DD.

Se você precisar modificar os dados, ANEXE AO FINAL DA RESPOSTA ESTE BLOCO ESTREITAMENTE EM JSON, dentro de <sutello_action>:
<sutello_action>
[
  {"action": "add_conta", "nome": "Carro", "valor": 2000, "vencimento": "2026-06-15", "qtdParcelas": 5},
  {"action": "delete_conta", "id": "ID_DA_CONTA_AQUI"},
  {"action": "edit_acordo", "id": "ID_DO_ACORDO", "valor": 150.50}
]
</sutello_action>
Mantenha a resposta super amigável em português (pt-BR). Formate dinheiro como R$ XX,XX.`;
}

async function enviarMensagemSutello() {
    const input = document.getElementById("chatInputField");
    const txt = input.value.trim();
    if (!txt) return;

    adicionarMensagemUI("user", txt);
    input.value = "";

    const wrapperTyping = document.createElement("div");
    wrapperTyping.className = "chat-bubble-wrapper";
    wrapperTyping.id = "sutello-typing-wrapper";
    wrapperTyping.innerHTML = `<div class="chat-typing-indicator"><div class="chat-typing-dot"></div><div class="chat-typing-dot"></div><div class="chat-typing-dot"></div></div>`;
    document.getElementById("chatHistoryContainer").appendChild(wrapperTyping);
    document.getElementById("chatHistoryContainer").scrollTop = document.getElementById("chatHistoryContainer").scrollHeight;

    // SISTEMA DE PROTEÇÃO: Impede envio se a chave for visivelmente inválida
    if (!apiKey || !apiKey.startsWith("AIza")) {
        setTimeout(() => {
            const tw = document.getElementById("sutello-typing-wrapper"); if(tw) tw.remove();
            adicionarMensagemUI("sutello", `⚠️ **Acesso Negado:** A chave de API no seu código não é válida. Toda chave oficial do Google começa com "**AIza**". \n\nPor favor, acesse o [Google AI Studio](https://aistudio.google.com/), crie uma nova chave de API e substitua no código do aplicativo.`);
        }, 1000);
        return;
    }

    try {
        // Modelo alterado para o 1.5 Flash (mais seguro para chaves de produção/públicas do AI Studio)
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        const resp = await fetch(url, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ 
                contents: [{ parts: [{ text: txt }] }], 
                systemInstruction: { parts: [{ text: obterPromptAvancado() }] } 
            }) 
        });
        
        if (!resp.ok) {
            // Captura o erro oficial do Google para evitar o "erro cego"
            const errorData = await resp.json();
            throw new Error(errorData.error?.message || `Erro de código: ${resp.status}`);
        }
        
        const data = await resp.json();
        
        const tw = document.getElementById("sutello-typing-wrapper"); if(tw) tw.remove();
        
        const textoOriginalIA = data.candidates?.[0]?.content?.parts?.[0]?.text || "Desculpe, não consegui formular uma resposta.";
        
        const respostaUsuario = processarAcoesIA(textoOriginalIA);
        adicionarMensagemUI("sutello", respostaUsuario);
        
    } catch(e) {
        const tw = document.getElementById("sutello-typing-wrapper"); if(tw) tw.remove();
        console.error("Erro completo da API:", e);
        
        // Exibe o erro de forma clara pro usuário no chat
        adicionarMensagemUI("sutello", `⚠️ **Falha de Comunicação com o Google:**\n\n*Detalhe do erro:* ${e.message}\n\n*Verifique se sua chave de API está correta ou se sua cota gratuita acabou.*`);
    }
}
